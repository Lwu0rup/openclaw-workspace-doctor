name: Python check

on:
  push:
  pull_request:

jobs:
  validate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install
        run: python -m pip install .
      - name: Import package
        run: python -c "import openclaw_workspace_doctor; print(openclaw_workspace_doctor.__version__)"
      - name: Run doctor against repo root
        run: openclaw-workspace-doctor . || true
      - name: Run JSON mode
        run: openclaw-workspace-doctor --json .
